<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#FBF7F0"/>
  <g transform="translate(16,17)" fill="none" stroke="#0D6E6E" stroke-width="1.2" stroke-linecap="round">
    <!-- center petal -->
    <ellipse cx="0" cy="-5" rx="3" ry="7" fill="#A8D4D4" stroke="#0D6E6E" opacity="0.9"/>
    <!-- left petals -->
    <ellipse cx="-5" cy="-3" rx="3" ry="6.5" fill="#A8D4D4" stroke="#0D6E6E" opacity="0.7" transform="rotate(25 -5 -3)"/>
    <ellipse cx="-9" cy="0" rx="2.5" ry="5.5" fill="#A8D4D4" stroke="#0D6E6E" opacity="0.5" transform="rotate(50 -9 0)"/>
    <!-- right petals -->
    <ellipse cx="5" cy="-3" rx="3" ry="6.5" fill="#A8D4D4" stroke="#0D6E6E" opacity="0.7" transform="rotate(-25 5 -3)"/>
    <ellipse cx="9" cy="0" rx="2.5" ry="5.5" fill="#A8D4D4" stroke="#0D6E6E" opacity="0.5" transform="rotate(-50 9 0)"/>
    <!-- center dot -->
    <circle cx="0" cy="-2" r="1.5" fill="#0D6E6E" opacity="0.6"/>
  </g>
</svg>
